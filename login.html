<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Desa Depok</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap"
        rel="stylesheet">

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #052e16 0%, #059669 60%, #d1fae5 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 48px 44px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-card h2 {
            color: #1e293b;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        .login-card p {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 500;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.2rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #059669;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: #047857;
            transform: translateY(-2px);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #059669;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div style="font-size: 3rem; color: #059669; margin-bottom: 10px;">
            <i class='bx bxs-tree'></i>
        </div>
        <h2>Super Admin</h2>
        <p>Silakan login untuk mengelola website</p>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-group">
                    <i class='bx bx-user'></i>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-group">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
                </div>
            </div>

            <div class="error-msg" id="error-msg">Username atau password salah!</div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <a href="index.html" class="back-link"><i class='bx bx-left-arrow-alt'></i> Kembali ke Beranda</a>
    </div>

    <script src="js/data.js?v=3"></script>
    <script>
        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin.html';
        }

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Ambil daftar admin dari API Backend
            const admins = await getAdmins();

            // Cek apakah ada admin yang cocok (dan fallback hardcoded admin/123 untuk versi statik)
            const validAdmin = (user === 'admin' && pass === '123') || admins.find(a => a.username === user && a.password === pass);

            if (validAdmin) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminUsername', user); // simpan info siapa yang login
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
